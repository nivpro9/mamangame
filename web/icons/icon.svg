<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="60%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <!-- Plane shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="512" height="512" rx="80" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="420" cy="80" r="45" fill="#FFF9C4" opacity="0.9"/>
  <circle cx="420" cy="80" r="34" fill="#FFEB3B" opacity="0.95"/>

  <!-- Clouds -->
  <!-- Cloud 1 -->
  <ellipse cx="100" cy="130" rx="70" ry="36" fill="white" opacity="0.88"/>
  <ellipse cx="68"  cy="142" rx="46" ry="28" fill="white" opacity="0.88"/>
  <ellipse cx="136" cy="142" rx="46" ry="28" fill="white" opacity="0.88"/>

  <!-- Cloud 2 (smaller) -->
  <ellipse cx="370" cy="190" rx="50" ry="26" fill="white" opacity="0.75"/>
  <ellipse cx="345" cy="200" rx="32" ry="20" fill="white" opacity="0.75"/>
  <ellipse cx="400" cy="200" rx="32" ry="20" fill="white" opacity="0.75"/>

  <!-- Cloud 3 (bottom-left) -->
  <ellipse cx="80" cy="370" rx="58" ry="28" fill="white" opacity="0.55"/>
  <ellipse cx="52"  cy="382" rx="36" ry="22" fill="white" opacity="0.55"/>
  <ellipse cx="112" cy="382" rx="36" ry="22" fill="white" opacity="0.55"/>

  <!-- Paper plane — center, flying right, slight upward tilt -->
  <g transform="translate(256,272) rotate(-14)" filter="url(#shadow)">
    <!-- Main body -->
    <polygon points="120,0 -80,-52 -32,0 -80,52"
             fill="white" stroke="#BBDEFB" stroke-width="3"/>
    <!-- Inner fold (left wing top) -->
    <polygon points="-32,0 -80,-52 -56,-20"
             fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5"/>
    <!-- Crease line -->
    <line x1="120" y1="0" x2="-32" y2="0"
          stroke="#90CAF9" stroke-width="2" opacity="0.7"/>
    <!-- Trailing edge highlight -->
    <line x1="-80" y1="-52" x2="-32" y2="0"
          stroke="#64B5F6" stroke-width="2" opacity="0.5"/>
    <line x1="-80" y1="52"  x2="-32" y2="0"
          stroke="#64B5F6" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Dotted trail behind plane -->
  <g opacity="0.35">
    <circle cx="148" cy="285" r="5" fill="#90CAF9"/>
    <circle cx="118" cy="293" r="4" fill="#90CAF9"/>
    <circle cx="92"  cy="300" r="3" fill="#90CAF9"/>
    <circle cx="70"  cy="306" r="2.5" fill="#90CAF9"/>
  </g>
</svg>
