<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#87CEEB">
<title>Paper Flight Evolution</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- MENU -->
<div id="screen-menu" class="screen active">
  <div class="menu-sky"></div>
  <div class="menu-content">
    <div class="logo">
      <div class="logo-plane">✈</div>
      <h1>PAPER FLIGHT</h1>
      <h2>EVOLUTION</h2>
    </div>
    <div class="vehicle-display">
      <canvas id="vehicleCanvas" width="120" height="80"></canvas>
      <div id="vehicle-name" class="vehicle-name">Paper Plane</div>
    </div>
    <div class="stats-row">
      <div class="stat"><span class="stat-icon">🪙</span><span id="menu-coins">0</span></div>
      <div class="stat"><span class="stat-icon">🏆</span><span id="menu-best">0</span></div>
    </div>
    <button id="playBtn" class="btn-play">PLAY</button>
    <button id="shopBtn" class="btn-shop">🔧 UPGRADES</button>
  </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <canvas id="gameCanvas"></canvas>
  <div class="game-hud">
    <div class="hud-left">
      <span class="hud-label">SCORE</span>
      <span id="hud-score">0</span>
    </div>
    <div class="hud-right">
      <span class="hud-label">🪙</span>
      <span id="hud-coins">0</span>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div id="screen-gameover" class="screen">
  <div class="gameover-content">
    <div id="go-crash-icon" class="crash-icon">💥</div>
    <h1 class="go-title">CRASHED!</h1>
    <div class="go-stats">
      <div class="go-stat">
        <div class="go-stat-label">SCORE</div>
        <div class="go-stat-value" id="go-score">0</div>
      </div>
      <div class="go-stat">
        <div class="go-stat-label">BEST</div>
        <div class="go-stat-value" id="go-best">0</div>
      </div>
      <div class="go-stat">
        <div class="go-stat-label">COINS</div>
        <div class="go-stat-value" id="go-coins">+0</div>
      </div>
    </div>
    <div id="go-newbest" class="new-best hidden">🏆 NEW BEST!</div>
    <button id="retryBtn" class="btn-play">PLAY AGAIN</button>
    <button id="goShopBtn" class="btn-shop">🔧 UPGRADES</button>
    <button id="goMenuBtn" class="btn-menu">MENU</button>
  </div>
</div>

<!-- SHOP -->
<div id="screen-shop" class="screen">
  <div class="shop-header">
    <button id="shopBackBtn" class="btn-back">←</button>
    <h1>UPGRADES</h1>
    <div class="shop-coins">🪙 <span id="shop-coins">0</span></div>
  </div>
  <div class="shop-section">
    <h3>VEHICLES</h3>
    <div class="vehicles-grid" id="vehicles-grid"></div>
  </div>
  <div class="shop-section">
    <h3>UPGRADES</h3>
    <div class="upgrades-list" id="upgrades-list"></div>
  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
